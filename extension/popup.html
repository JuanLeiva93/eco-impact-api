<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h3>EcoImpact Tracker</h3>
    <div id="stats">
      <div class="item"><span>CO2:</span><span id="co2" class="value">0 g</span></div>
      <div class="item"><span>GB Usados:</span><span id="gb" class="value">0 GB</span></div>
    </div>
    <div style="margin-top: 15px;">
      <button id="start">Iniciar</button>
      <button id="stop" disabled>Detener</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
